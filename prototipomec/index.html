<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Prototipo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        .container {
            display: flex;
            gap: 20px;
        }

        .card {
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 8px;
            overflow: hidden;
            text-decoration: none;
            color: black;
            display: flex;
            flex-direction: column;
        }

        .frame-wrapper {
            width: 100%;
            aspect-ratio: 16 / 10;
            overflow: hidden;
            background: #000;
        }

        iframe {
            width: 1200px;
            height: 900px;
            border: none;

            transform: scale(0.6);
            transform-origin: top left;
        }

        .footer {
            padding: 10px;
            background: #f5f5f5;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-weight: bold;
        }

        .btn {
            background: #007bff;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            font-size: 14px;
        }

        .card:hover .btn {
            background: #0056b3;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<h1>Vista de páginas</h1>

<div class="container">

    <a class="card" href="pagina1.html" target="_blank">
        <div class="frame-wrapper">
            <iframe src="pagina1.html"></iframe>
        </div>
        <div class="footer">
            <span class="title">Página 1</span>
            <span class="btn">Abrir</span>
        </div>
    </a>

    <a class="card" href="pagina2.html" target="_blank">
        <div class="frame-wrapper">
            <iframe src="pagina2.html"></iframe>
        </div>
        <div class="footer">
            <span class="title">Página 2</span>
            <span class="btn">Abrir</span>
        </div>
    </a>

    <a class="card" href="pagina3.html" target="_blank">
        <div class="frame-wrapper">
            <iframe src="pagina3.html"></iframe>
        </div>
        <div class="footer">
            <span class="title">Página 3</span>
            <span class="btn">Abrir</span>
        </div>
    </a>

</div>

</body>
</html>
